name: Linter

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  flake8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar flake8
        run: uv tool install flake8

      - name: Run flake8
        run: flake8 src/
