volumes:
  service_postgres_data:

services:
  db:
    container_name: db
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - service_postgres_data:/var/lib/postgresql
    env_file:
      - ./env-vars/.postgres.env

  service:
    container_name: service
    build:
      context: .
    command: ["./start_service.sh"]
    ports:
      - "8080:8080"
    volumes:
      - ./src:/src
    env_file:
      - ./env-vars/.service.env
      - ./env-vars/.postgres.env
    depends_on:
      - db
    develop:
      watch:
        - action: sync
          path: ./src
          target: /src
        - action: rebuild
          path: ./pyproject.toml
