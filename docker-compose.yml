volumes:
  service_postgres_data:
  grafana_data:

services:
  db:
    container_name: db
    image: postgres:18-alpine
    # Bind so localhost (host) — evita conflito com Postgres do host na 0.0.0.0:5432.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - service_postgres_data:/var/lib/postgresql
    env_file:
      - ./env-vars/.postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  service:
    container_name: service
    build:
      context: .
    command: ["./start_service.sh"]
    ports:
      - "8080:8080"
    volumes:
      - ./src:/src:z
    env_file:
      - ./env-vars/.service.env
      - ./env-vars/.postgres.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /src
        - action: rebuild
          path: ./pyproject.toml

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    env_file:
      - ./env-vars/.postgres.env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: volkovlabs-echarts-panel
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: volkovlabs-echarts-panel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
