[tox]
skipsdist = True
envlist = test_service

[testenv]
install_command = uv pip install {opts} {packages}

[testenv:test_service]
envdir = {toxworkdir}/test_service
# Deps de teste vivem em [dependency-groups] dev no pyproject.toml.
# Tox roda em ambiente isolado (CI), entao instala explicitamente — o venv
# do container Docker e populado via `uv sync` (Dockerfile).
deps =
    pytest
    pytest-cov
    pytest-django
    pytest-mock
    coverage
    dj_rest_auth
    -r {toxinidir}/pyproject.toml

setenv =
  PYTHONPATH=.
  DJANGO_SETTINGS_MODULE=config.settings.test

commands =
    coverage erase
    coverage run -m pytest src {posargs} -vv --junitxml=./junit.xml
    coverage xml -o coverage.xml
    coverage report --show-missing
