volumes:
  service_postgres_data:

services:
  db:
    container_name: db
    image: postgres:18-alpine
    # Bind so localhost (host) — evita conflito com Postgres do host na 0.0.0.0:5432.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - service_postgres_data:/var/lib/postgresql
    env_file:
      - ./env-vars/.postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  service:
    container_name: service
    build:
      context: .
    command: ["./start_service.sh"]
    ports:
      - "8080:8080"
    volumes:
      - ./src:/src:z
    env_file:
      - ./env-vars/.service.env
      - ./env-vars/.postgres.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /src
        - action: rebuild
          path: ./pyproject.toml
